name: CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test Nunki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/main/frontend/package-lock.json'

      - name: Build and Package with Maven
        run: |
          mvn clean package -DskipTests

      - name: Run Unit Tests
        run: |
          mvn test

      - name: Upload Uber Jar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunki-jar
          path: target/nunki-0.0.1-SNAPSHOT.jar

  integration-test:
    name: Quasar & Nunki Integration Test
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Nunki
        uses: actions/checkout@v4
        with:
          path: nunki

      - name: Checkout Quasar
        uses: actions/checkout@v4
        with:
          repository: mlecabellec/quasar
          path: quasar
          # If quasar is a private repo, GITHUB_TOKEN might need broad scope
          # or the user can supply a PAT. Defaulting to empty so it uses GITHUB_TOKEN.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker Stack
        run: |
          docker compose -f nunki/helpers/docker-compose.yml build

      - name: Start Docker Stack
        run: |
          docker compose -f nunki/helpers/docker-compose.yml up -d

      - name: Wait for Containers and Verify
        run: |
          echo "Waiting for services to spin up..."
          sleep 15
          docker compose -f nunki/helpers/docker-compose.yml ps
          
          # Inspect logs to verify connection
          echo "=== Quasar Server Logs ==="
          docker compose -f nunki/helpers/docker-compose.yml logs quasar
          
          echo "=== Nunki Application Logs ==="
          docker compose -f nunki/helpers/docker-compose.yml logs nunki
          
          # Check if they are running
          NUNKI_STATUS=$(docker inspect -f '{{.State.Running}}' nunki-app)
          QUASAR_STATUS=$(docker inspect -f '{{.State.Running}}' quasar-server)
          
          if [ "$NUNKI_STATUS" = "true" ] && [ "$QUASAR_STATUS" = "true" ]; then
            echo "Integration check PASSED! Both containers are running successfully."
          else
            echo "Integration check FAILED! One or both containers failed to start."
            exit 1
          fi

      - name: Stop Docker Stack
        if: always()
        run: |
          docker compose -f nunki/helpers/docker-compose.yml down

  build-docs:
    name: Build & Upload Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout MkDocs Kit
        uses: actions/checkout@v4
        with:
          repository: mlecabellec/mkdocs-kit
          path: mkdocs-kit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java (required for PlantUML)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (PlantUML, Pango, Cairo)
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 libjpeg-dev libopenjp2-7-dev libffi-dev

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install "setuptools<82.0.0"
          pip install mkdocs mkdocs-material weasyprint wireviz nwdiag bit_field

      - name: Build Documentation
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE/mkdocs-kit/src python3 $GITHUB_WORKSPACE/mkdocs-kit/src/mkdocs_kit/cli.py build
        working-directory: doc

      - name: Upload Documentation Site Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunki-docs-site
          path: doc/site/

      - name: Upload PDF Manual Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunki-docs-pdf
          path: doc/documentation.pdf
