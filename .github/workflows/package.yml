name: Multi-OS Packaging and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package:
    name: Package for ${{ matrix.container }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: "debian:bookworm"
            pkg_type: "deb"
            suffix: "debian-bookworm"
          - container: "debian:trixie"
            pkg_type: "deb"
            suffix: "debian-trixie"
          - container: "fedora:latest"
            pkg_type: "rpm"
            suffix: "fedora-latest"
          - container: "archlinux:latest"
            pkg_type: "arch"
            suffix: "archlinux-latest"

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Pre-install git and core tools (Debian/Fedora)
        if: "!contains(matrix.container, 'archlinux')"
        run: |
          if command -v apt-get > /dev/null; then
            apt-get update && apt-get install -y git curl sudo
          elif command -v dnf > /dev/null; then
            dnf install -y git curl sudo
          fi

      - name: Pre-install git and core tools (Arch)
        if: "contains(matrix.container, 'archlinux')"
        run: |
          pacman -Sy --noconfirm git curl sudo base-devel

      - name: Checkout Nunki
        uses: actions/checkout@v4
        with:
          path: nunki

      - name: Checkout Quasar
        uses: actions/checkout@v4
        with:
          repository: mlecabellec/quasar
          path: quasar
          token: ${{ secrets.GITHUB_TOKEN }}

      # Install specific dependencies for Nunki and Quasar build
      - name: Install Build Dependencies (Debian)
        if: "startsWith(matrix.container, 'debian')"
        run: |
          apt-get update
          if [ "${{ matrix.container }}" = "debian:bookworm" ]; then
            apt-get install -y wget gnupg
            mkdir -p /etc/apt/keyrings
            wget -O - https://packages.adoptium.net/artifactory/api/gpg/key/public | tee /etc/apt/keyrings/adoptium.asc
            echo "deb [signed-by=/etc/apt/keyrings/adoptium.asc] https://packages.adoptium.net/artifactory/deb bookworm main" | tee /etc/apt/sources.list.d/adoptium.list
            apt-get update
            apt-get install -y temurin-21-jdk
          else
            apt-get install -y openjdk-21-jdk
          fi
          apt-get install -y ccache cmake g++ make pkg-config python3 file linux-headers-amd64 \
                             libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev \
                             libgmp-dev libssl-dev uuid-dev binutils-dev zlib1g-dev libiberty-dev \
                             maven dpkg-dev python3-pip python3-venv plantuml libpango-1.0-0
          # Install Node.js v22
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs

      - name: Install Build Dependencies (Fedora)
        if: "startsWith(matrix.container, 'fedora')"
        run: |
          dnf install -y gcc-c++ make cmake pkgconf-pkg-config python3 file \
                         alsa-lib-devel libX11-devel libXrandr-devel libXi-devel \
                         mesa-libGL-devel mesa-libGLU-devel libXcursor-devel libXinerama-devel \
                         gmp-devel openssl-devel libuuid-devel zlib-devel binutils-devel libzstd-devel \
                         java-latest-openjdk-devel maven rpm-build python3-pip plantuml pango cairo
          # Install Node.js v22
          curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
          dnf install -y nodejs

      - name: Install Build Dependencies (Arch)
        if: "startsWith(matrix.container, 'archlinux')"
        run: |
          pacman -S --needed --noconfirm \
                         cmake python file \
                         alsa-lib libx11 libxrandr libxi mesa glu libxcursor libxinerama \
                         gmp openssl util-linux-libs zlib binutils jdk-openjdk maven nodejs npm python-pip plantuml pango cairo \
                         cantarell-fonts gnu-free-fonts

      # Build & Package Nunki
      - name: Build Nunki
        run: |
          cd nunki
          mvn clean package -DskipTests
          ./helpers/package.sh ${{ matrix.pkg_type }} ../dist-packages

      # Build & Package Quasar
      - name: Build and Package Quasar
        run: |
          cd quasar
          mkdir -p build-projects
          cmake -S cmake-projects -B build-projects -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_SHARED_LINKER_FLAGS="-lzstd" -DCMAKE_EXE_LINKER_FLAGS="-lzstd"
          cmake --build build-projects
          ../nunki/helpers/package-quasar.sh ${{ matrix.pkg_type }} ../dist-packages

      # Generate Dockerfiles for Quasar and Nunki for this distribution
      - name: Generate Distro Dockerfiles
        run: |
          mkdir -p distro-dockerfiles
          
          # 1. Generate Nunki Dockerfile
          if [ "${{ matrix.pkg_type }}" = "deb" ]; then
            echo "FROM ${{ matrix.container }}" > distro-dockerfiles/Dockerfile.nunki
            echo "RUN apt-get update && apt-get install -y openjdk-21-jre-headless && rm -rf /var/lib/apt/lists/*" >> distro-dockerfiles/Dockerfile.nunki
            echo "COPY nunki_*.deb /tmp/" >> distro-dockerfiles/Dockerfile.nunki
            echo "RUN dpkg -i /tmp/nunki_*.deb || apt-get install -f -y" >> distro-dockerfiles/Dockerfile.nunki
            echo "EXPOSE 8080" >> distro-dockerfiles/Dockerfile.nunki
            echo 'ENTRYPOINT ["/usr/bin/nunki"]' >> distro-dockerfiles/Dockerfile.nunki
          elif [ "${{ matrix.pkg_type }}" = "rpm" ]; then
            echo "FROM ${{ matrix.container }}" > distro-dockerfiles/Dockerfile.nunki
            echo "RUN dnf install -y java-21-openjdk-headless && dnf clean all" >> distro-dockerfiles/Dockerfile.nunki
            echo "COPY nunki-*.rpm /tmp/" >> distro-dockerfiles/Dockerfile.nunki
            echo "RUN dnf localinstall -y /tmp/nunki-*.rpm" >> distro-dockerfiles/Dockerfile.nunki
            echo "EXPOSE 8080" >> distro-dockerfiles/Dockerfile.nunki
            echo 'ENTRYPOINT ["/usr/bin/nunki"]' >> distro-dockerfiles/Dockerfile.nunki
          elif [ "${{ matrix.pkg_type }}" = "arch" ]; then
            echo "FROM ${{ matrix.container }}" > distro-dockerfiles/Dockerfile.nunki
            echo "COPY nunki-*.pkg.tar.zst /tmp/" >> distro-dockerfiles/Dockerfile.nunki
            echo "RUN pacman -Syu --noconfirm && pacman -U --noconfirm /tmp/nunki-*.pkg.tar.zst && pacman -Scc --noconfirm" >> distro-dockerfiles/Dockerfile.nunki
            echo "EXPOSE 8080" >> distro-dockerfiles/Dockerfile.nunki
            echo 'ENTRYPOINT ["/usr/bin/nunki"]' >> distro-dockerfiles/Dockerfile.nunki
          fi

          # 2. Generate Quasar Dockerfile
          if [ "${{ matrix.pkg_type }}" = "deb" ]; then
            echo "FROM ${{ matrix.container }}" > distro-dockerfiles/Dockerfile.quasar
            echo "RUN apt-get update && apt-get install -y libssl3 libuuid1 zlib1g && rm -rf /var/lib/apt/lists/*" >> distro-dockerfiles/Dockerfile.quasar
            echo "COPY quasar_*.deb /tmp/" >> distro-dockerfiles/Dockerfile.quasar
            echo "RUN dpkg -i /tmp/quasar_*.deb || apt-get install -f -y" >> distro-dockerfiles/Dockerfile.quasar
            echo "EXPOSE 4840" >> distro-dockerfiles/Dockerfile.quasar
            echo 'ENTRYPOINT ["/usr/bin/quasar_server"]' >> distro-dockerfiles/Dockerfile.quasar
          elif [ "${{ matrix.pkg_type }}" = "rpm" ]; then
            echo "FROM ${{ matrix.container }}" > distro-dockerfiles/Dockerfile.quasar
            echo "RUN dnf install -y openssl zlib libuuid && dnf clean all" >> distro-dockerfiles/Dockerfile.quasar
            echo "COPY quasar-*.rpm /tmp/" >> distro-dockerfiles/Dockerfile.quasar
            echo "RUN dnf localinstall -y /tmp/quasar-*.rpm" >> distro-dockerfiles/Dockerfile.quasar
            echo "EXPOSE 4840" >> distro-dockerfiles/Dockerfile.quasar
            echo 'ENTRYPOINT ["/usr/bin/quasar_server"]' >> distro-dockerfiles/Dockerfile.quasar
          elif [ "${{ matrix.pkg_type }}" = "arch" ]; then
            echo "FROM ${{ matrix.container }}" > distro-dockerfiles/Dockerfile.quasar
            echo "COPY quasar-*.pkg.tar.zst /tmp/" >> distro-dockerfiles/Dockerfile.quasar
            echo "RUN pacman -Syu --noconfirm && pacman -U --noconfirm /tmp/quasar-*.pkg.tar.zst && pacman -Scc --noconfirm" >> distro-dockerfiles/Dockerfile.quasar
            echo "EXPOSE 4840" >> distro-dockerfiles/Dockerfile.quasar
            echo 'ENTRYPOINT ["/usr/bin/quasar_server"]' >> distro-dockerfiles/Dockerfile.quasar
          fi
          
          # Copy generated Dockerfiles to target distribution packages
          cp distro-dockerfiles/Dockerfile.nunki dist-packages/
          cp distro-dockerfiles/Dockerfile.quasar dist-packages/

      - name: Checkout MkDocs Kit
        uses: actions/checkout@v4
        with:
          repository: mlecabellec/mkdocs-kit
          path: mkdocs-kit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python dependencies for documentation
        run: |
          python3 -m venv .venv-docs
          .venv-docs/bin/pip install --upgrade pip
          .venv-docs/bin/pip install "setuptools<82.0.0"
          .venv-docs/bin/pip install mkdocs mkdocs-material weasyprint wireviz nwdiag bit_field

      - name: Build Nunki Documentation
        continue-on-error: true
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE/mkdocs-kit/src $GITHUB_WORKSPACE/.venv-docs/bin/python3 $GITHUB_WORKSPACE/mkdocs-kit/src/mkdocs_kit/cli.py build
        working-directory: nunki/doc

      - name: Build Quasar Documentation
        continue-on-error: true
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE/mkdocs-kit/src $GITHUB_WORKSPACE/.venv-docs/bin/python3 $GITHUB_WORKSPACE/mkdocs-kit/src/mkdocs_kit/cli.py build
        working-directory: quasar/doc

      - name: Copy Documentation to dist-packages
        run: |
          mkdir -p dist-packages/docs-nunki dist-packages/docs-quasar
          cp nunki/doc/documentation.pdf dist-packages/nunki-documentation.pdf || true
          cp -r nunki/doc/site dist-packages/docs-nunki/site || true
          cp quasar/doc/documentation.pdf dist-packages/quasar-documentation.pdf || true
          cp -r quasar/doc/site dist-packages/docs-quasar/site || true

      - name: Upload Linux Packages & Dockerfiles
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: dist-packages/*

